<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <script data-cfasync="false" src="//dcbbwymp1bhlf.cloudfront.net/?wbbcd=1444225"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Link Shortener</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🔗 اختصار الروابط</h1>

        <p class="desc">
            الصق الرابط ثم اضغط اختصار
        </p>

        <input
            id="url"
            type="url"
            placeholder="https://example.com">

        <input
            id="slug"
            type="text"
            maxlength="30"
            placeholder="اسم الرابط (اختياري) مثال: youtube">

        <button id="shortBtn" onclick="shorten()">
            اختصار الرابط
        </button>

        <div id="loading" style="display:none;">
            جاري إنشاء الرابط...
        </div>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>

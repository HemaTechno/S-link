<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <script data-cfasync="false" src="//dcbbwymp1bhlf.cloudfront.net/?wbbcd=1444225"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Link Shortener</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            /* خلفية متدرجة انسيابية فائقة الجودة متوافقة مع لوحة الإحصائيات */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #0f172a;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* حاوية زجاجية ناعمة وعصرية جداً */
        .container {
            width: 480px;
            max-width: 100%;
            padding: 45px 35px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.45);
            box-shadow: 0 20px 50px rgba(31, 38, 135, 0.06),
                        inset 0 1px 0 rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container:hover {
            transform: translateY(-2px);
        }

        h1 {
            color: #1e1b4b;
            text-align: center;
            margin-bottom: 12px;
            font-size: 2.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 0px 1px 2px rgba(255, 255, 255, 0.8);
        }

        .desc {
            text-align: center;
            color: #475569;
            margin-bottom: 35px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* حاوية مدخلات تفاعلية بأيقونات مدمجة */
        .input-group {
            position: relative;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            right: 18px;
            color: #4f46e5;
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        input, select {
            width: 100%;
            padding: 15px 48px 15px 18px; /* مسافة مخصصة للأيقونة من اليمين */
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            outline: none;
            color: #0f172a;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.01), 0 4px 12px rgba(0, 0, 0, 0.02);
        }

        input::placeholder {
            color: #64748b;
            font-weight: 500;
        }

        input:focus, select:focus {
            background: #ffffff;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15), 0 10px 20px rgba(79, 70, 229, 0.05);
        }

        input:focus + i {
            transform: scale(1.1);
            color: #3b82f6;
        }

        /* تنسيق قسم الخيارات المتقدمة الفاخر */
        .advanced-settings {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            padding: 20px 16px 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.01);
        }

        .setting-item {
            flex: 1;
            text-align: right;
            position: relative;
        }

        .advanced-settings label {
            display: block;
            margin-bottom: 8px;
            font-size: 12.5px;
            font-weight: 800;
            color: #1e1b4b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .advanced-settings label i {
            color: #4f46e5;
            font-size: 12px;
        }

        .advanced-settings select {
            padding: 12px 14px 12px 32px; /* تعديل مسافات القوائم المنسدلة */
            border-radius: 12px;
            font-size: 13.5px;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2.5'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: left 12px center;
            background-size: 12px;
        }

        /* تنسيق زر الاختصار الذكي */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.35);
            background: linear-gradient(135deg, #4338ca 0%, #2563eb 100%);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.4);
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* حالة التحميل البصرية */
        #loading {
            margin-top: 20px;
            text-align: center;
            color: #4f46e5;
            font-weight: 700;
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(0.98); }
        }

        /* صناديق النتائج والأخطاء */
        .success-box, .error-box {
            margin-top: 28px;
            padding: 22px;
            border-radius: 18px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-box {
            background: rgba(240, 253, 244, 0.5);
            border-color: rgba(74, 222, 128, 0.5);
        }

        .success-box p {
            color: #15803d;
            font-weight: 800;
            margin-bottom: 15px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .success-box input {
            background: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-weight: 800;
            color: #4f46e5;
            margin-bottom: 14px;
            padding: 12px;
        }

        .success-box button {
            background: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            padding: 12px;
            font-size: 14px;
            border-radius: 12px;
        }

        .success-box button:hover {
            background: #059669;
            box-shadow: 0 6px 18px rgba(16, 185, 129, 0.3);
        }

        .error-box {
            background: rgba(254, 242, 242, 0.55);
            border-color: rgba(248, 113, 113, 0.5);
            color: #991b1b;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        @media (max-width: 480px) {
            .container { padding: 35px 20px; }
            .advanced-settings { flex-direction: column; gap: 12px; padding-bottom: 16px; }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1><i class="fa-solid fa-wand-magic-sparkles"></i> اختصار الروابط</h1>

        <p class="desc">
            الصق الرابط الطويل الخاص بك لتوليد رابط ذكي ومربح
        </p>

        <!-- حقل الرابط الأساسي بالأيقونة -->
        <div class="input-group">
            <input id="url" type="url" placeholder="https://example.com">
            <i class="fa-solid fa-link"></i>
        </div>

        <!-- حقل الاسم المخصص بالأيقونة -->
        <div class="input-group">
            <input id="slug" type="text" maxlength="30" placeholder="اسم الرابط المخصص (اختياري) مثال: name">
            <i class="fa-solid fa-signature"></i>
        </div>

        <!-- الإعدادات المتقدمة المدمجة بشكل فخم وأنيق -->
        <div class="advanced-settings">
            <div class="setting-item">
                <label for="tier"><i class="fa-solid fa-circle-dollar-to-slot"></i> مستوى الربح (Tier):</label>
                <select id="tier">
                    <option value="1" selected>المستوى 1 (عادي)</option>
                    <option value="2">المستوى 2 (متوسط)</option>
                    <option value="3">المستوى 3 (عالي الأرباح)</option>
                </select>
            </div>

            <div class="setting-item">
                <label for="tasks"><i class="fa-solid fa-list-check"></i> المهام المطلوبة:</label>
                <select id="tasks">
                    <option value="1">مهمة واحدة</option>
                    <option value="2">مهمتان</option>
                    <option value="3" selected>3 مهام (موصى به)</option>
                    <option value="4">4 مهام</option>
                </select>
            </div>
        </div>

        <!-- زر الاختصار الرئيسي -->
        <button id="shortBtn" onclick="shorten()">
            <i class="fa-solid fa-bolt"></i> اختصار الرابط الآن
        </button>

        <div id="loading" style="display:none;">
            <i class="fa-solid fa-spinner fa-spin"></i> جاري تهيئة لوكر LootLabs وإنشاء رابطك...
        </div>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة تجربة سكربت Linkvertise</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #007bff; }
        .link-section {
            margin: 25px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        a:hover { background-color: #0056b3; }
        .blacklist-link { background-color: #6c757d; }
        .blacklist-link:hover { background-color: #5a6268; }
    </style>
</head>
<body>

<div class="container">
    <h1>صفحة اختبار Linkvertise API</h1>
    <p>استخدم الروابط بالأسفل لتجربة السكربت والتأكد من أنه يعمل بشكل صحيح.</p>

    <!-- روابط للتجربة -->
    <div class="link-section">
        <h3>1. روابط خارجية (يجب أن تتحول إلى Linkvertise):</h3>
        <a href="https://www.wikipedia.org" target="_blank">انتقل إلى ويكيبيديا</a>
        <a href="https://www.github.com" target="_blank">انتقل إلى جيت هاب</a>
    </div>

    <div class="link-section">
        <h3>2. روابط مستثناة (لن تتحول بسبب الـ Blacklist):</h3>
        <!-- الرابط ده مش هيتحول لأن google.com موجود في القائمة السوداء في السكربت بالأسفل -->
        <a href="https://www.google.com" target="_blank" class="blacklist-link">انتقل إلى جوجل (مستثنى)</a>
    </div>
</div>

<!-- ========================================== -->
<!-- كود Linkvertise Script الخاص بك مضاف هنا -->
<!-- ========================================== -->
<script src="https://publisher.linkvertise.com/cdn/linkvertise.js"></script>
<script>
    linkvertise(1322389, {
        whitelist: [], 
        // تم إضافة google.com كمثال لكي تلاحظ الفرق بنفسك أثناء التجربة
        blacklist: ["localhost", "127.0.0.1", "google.com"] 
    });
</script>

</body>
</html>

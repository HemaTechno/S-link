<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة LootLabs</title>

    <!-- سكريبت LootLabs -->
    <script data-cfasync="false"
        src="//dcbbwymp1bhlf.cloudfront.net/?wbbcd=1163410">
    </script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Cairo,sans-serif;
        }

        body{
            background:#0f172a;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:90%;
            max-width:450px;
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,.4);
        }

        h1{
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:25px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:#fff;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        #status{
            margin-top:20px;
            color:#22c55e;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🧪 صفحة تجربة LootLabs</h1>

    <p>
        اضغط الزر بالأسفل لتجربة تشغيل السكريبت.
    </p>

    <button id="btn">
        تشغيل التجربة
    </button>

    <div id="status"></div>
</div>

<script>

document.getElementById("btn").onclick = function(){

    document.getElementById("status").innerHTML =
        "✅ تم الضغط على الزر.<br>إذا كان السكريبت يعمل فستظهر نافذة أو عرض LootLabs حسب إعدادات حسابك.";

};

</script>

</body>
</html>

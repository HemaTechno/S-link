<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LootLabs Test</title>

    <!-- LootLabs -->
    <script data-cfasync="false" src="//dcbbwymp1bhlf.cloudfront.net/?wbbcd=1444225"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#111827;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:90%;
            max-width:420px;
            background:#1f2937;
            border-radius:15px;
            padding:30px;
            text-align:center;
        }

        h1{
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:25px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        #status{
            margin-top:20px;
            color:#22c55e;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>LootLabs Test</h1>

    <p>
        اضغط في أي مكان أو على الزر بالأسفل.
    </p>

    <button id="btn">
        اضغط هنا
    </button>

    <div id="status"></div>
</div>

<script>
document.getElementById("btn").onclick = function () {
    document.getElementById("status").innerHTML =
        "تم الضغط على الزر. إذا كان LootLabs مربوط بشكل صحيح فسيظهر العرض حسب إعدادات حسابك.";
};
</script>

</body>
</html>

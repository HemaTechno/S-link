<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والإحصائيات 📊</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: #0f172a;
            padding: 40px 20px;
            display: block;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.55);
            box-shadow: 0 10px 30px 0 rgba(31, 38, 135, 0.05),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-profile i {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            padding: 14px;
            border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2);
        }

        .header-info h1 {
            color: #1e1b4b;
            font-size: 22px;
            font-weight: 800;
        }

        .header-info p {
            color: #475569;
            font-size: 13px;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper i {
            position: absolute;
            right: 14px;
            color: #64748b;
            font-size: 14px;
        }

        select, input {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 14px;
            outline: none;
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        input {
            padding-right: 40px;
            width: 200px;
        }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        select {
            cursor: pointer;
            padding-left: 28px;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2.5'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: left 12px center;
            background-size: 12px;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.45);
            box-shadow: 0 10px 30px 0 rgba(31, 38, 135, 0.04),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 24px;
            border-radius: 20px;
        }

        .stat-card h3 {
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-card h3 i {
            color: #4f46e5;
            font-size: 14px;
        }

        .stat-card:nth-child(2) h3 i {
            color: #10b981;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 800;
            color: #1e1b4b;
        }

        .or-divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .or-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.35);
            z-index: 1;
        }

        .or-divider span {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            color: #475569;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.45);
            box-shadow: 0 10px 30px 0 rgba(31, 38, 135, 0.04),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.55);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .link-header {
            padding: 22px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .link-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .link-slug {
            font-size: 17px;
            font-weight: 800;
            color: #4f46e5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .link-url {
            font-size: 13px;
            color: #475569;
            word-break: break-all;
            max-width: 85%;
            font-weight: 500;
        }

        .link-meta {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .success-badge {
            padding: 8px 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(209, 250, 229, 0.5);
            color: #065f46;
        }

        .toggle-icon {
            font-size: 12px;
            color: #475569;
            transition: transform 0.35s ease;
            background: rgba(255, 255, 255, 0.6);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .link-item.open .toggle-icon {
            transform: rotate(180deg);
            color: white;
            background: #4f46e5;
            border-color: #4f46e5;
        }

        .link-details {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .link-item.open .link-details {
            grid-template-rows: 1fr;
        }

        .details-wrapper {
            overflow: hidden;
        }

        .edit-box {
            padding: 24px;
        }

        .edit-box h4 {
            font-size: 14px;
            font-weight: 800;
            color: #1e1b4b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-input-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .edit-url-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(79, 70, 229, 0.3);
            padding: 14px;
        }

        .edit-url-input:focus {
            background: #ffffff;
            border-color: #4f46e5;
        }

        /* تحسين الأزرار */
        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .save-btn, .delete-btn {
            border: none;
            padding: 0 20px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.3);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(239, 68, 68, 0.3);
        }

        .no-data {
            text-align: center;
            color: #475569;
            padding: 30px;
            font-size: 13px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            body { padding: 20px 12px; }
            header { flex-direction: column; align-items: stretch; gap: 16px; }
            .controls { flex-direction: column; align-items: stretch; }
            .search-wrapper, input, select { width: 100%; }
            .link-header { flex-direction: column; align-items: flex-start; gap: 14px; }
            .link-meta { width: 100%; justify-content: space-between; }
            .edit-input-group { flex-direction: column; }
            .action-buttons { width: 100%; }
            .save-btn, .delete-btn { padding: 14px; justify-content: center; flex: 1; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <div class="header-profile">
                <i class="fa-solid fa-gear"></i>
                <div class="header-info">
                    <h1>لوحة التحكم وتحليل الإحصائيات</h1>
                    <p>إدارة وتعديل الروابط المحفوظة في قاعدة البيانات</p>
                </div>
            </div>
            <div class="controls">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="بحث عن رابط..." oninput="renderDashboard()">
                </div>
                <select id="sortSelect" onchange="renderDashboard()">
                    <option value="tasks-desc">الأعلى اكتمالاً للمهام 🔥</option>
                    <option value="tasks-asc">الأقل اكتمالاً للمهام ❄️</option>
                    <option value="date-desc">الأحدث إنشاءً 🕒</option>
                </select>
            </div>
        </header>

        <div class="stats-overview">
            <div class="stat-card">
                <h3><i class="fa-solid fa-link"></i> إجمالي الروابط المختصرة</h3>
                <div class="value" id="totalLinks">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fa-solid fa-square-check"></i> إجمالي المهام المكتملة</h3>
                <div class="value" id="totalCompleted" style="color: #10b981">0</div>
            </div>
        </div>

        <div class="or-divider">
            <span>إدارة وتعديل محتوى الروابط</span>
        </div>

        <div class="links-list" id="linksList">
            <!-- سيتم توليد الكروت هنا -->
        </div>
    </div>

    <script>
        let mockData = []; 

        async function fetchAnalytics() {
            try {
                const response = await fetch('/api/analytics'); 
                const data = await response.json();
                if(data.success) {
                    mockData = data.links; 
                    renderDashboard();     
                }
            } catch (err) {
                console.error("فشل جلب البيانات الحقيقية:", err);
            }
        }

        function calculateOverview(links) {
            document.getElementById('totalLinks').innerText = links.length;
            const totalCompleted = links.reduce((sum, link) => sum + (link.completedTasksCount || 0), 0);
            document.getElementById('totalCompleted').innerText = totalCompleted;
        }

        function toggleLinkDetails(element) {
            const item = element.parentElement;
            item.classList.toggle('open');
        }

        // دالة برمجية تفاعلية لتحديث الرابط فوراً داخل الداتا
        async function updateLink(id, inputId) {
            const newUrl = document.getElementById(inputId).value;
            if(!newUrl) return alert("الرجاء إدخال رابط صالح!");

            try {
                const response = await fetch('/api/analytics', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, url: newUrl })
                });
                
                const result = await response.json();
                if(result.success) {
                    alert("تم تحديث الرابط في قاعدة البيانات بنجاح! 🎉");
                    fetchAnalytics(); 
                } else {
                    alert("فشل التحديث: " + result.message);
                }
            } catch (err) {
                console.error("خطأ أثناء تحديث الرابط:", err);
                alert("تم إرسال طلب التحديث بنجاح (تأكد من إعداد سيرفر الـ PUT لديك).");
            }
        }

        // دالة برمجية لحذف الرابط نهائياً من الداتا
        async function deleteLink(id) {
            if(!confirm("هل أنت متأكد من رغبتك في حذف هذا الرابط نهائياً من قاعدة البيانات؟ ⚠️")) return;

            try {
                const response = await fetch('/api/analytics', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });

                const result = await response.json();
                if(result.success) {
                    alert("تم حذف الرابط بنجاح! 🗑️");
                    fetchAnalytics(); 
                } else {
                    alert("فشل الحذف: " + result.message);
                }
            } catch (err) {
                console.error("خطأ أثناء حذف الرابط:", err);
                alert("تم إرسال طلب الحذف بنجاح (تأكد من دعم السيرفر لطلب الـ DELETE ومزامنته).");
                fetchAnalytics();
            }
        }

        function renderDashboard() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const sortMethod = document.getElementById('sortSelect').value;
            const container = document.getElementById('linksList');
            
            container.innerHTML = "";

            let filteredLinks = mockData.filter(link => {
                return (link.id && link.id.toLowerCase().includes(searchInput)) || 
                       (link.url && link.url.toLowerCase().includes(searchInput));
            });

            if (sortMethod === 'tasks-desc') {
                filteredLinks.sort((a, b) => (b.completedTasksCount || 0) - (a.completedTasksCount || 0));
            } else if (sortMethod === 'tasks-asc') {
                filteredLinks.sort((a, b) => (a.completedTasksCount || 0) - (b.completedTasksCount || 0));
            } else if (sortMethod === 'date-desc') {
                filteredLinks.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }

            calculateOverview(filteredLinks);

            if (filteredLinks.length === 0) {
                container.innerHTML = '<div class="no-data"><i class="fa-regular fa-folder-open"></i> لم يتم العثور على روابط.</div>';
                return;
            }

            filteredLinks.forEach(link => {
                const inputId = `input-${link.id}`;
                const linkItem = document.createElement('div');
                linkItem.className = 'link-item';
                linkItem.innerHTML = `
                    <div class="link-header" onclick="toggleLinkDetails(this)">
                        <div class="link-info">
                            <div class="link-slug"><i class="fa-solid fa-link" style="font-size: 14px;"></i> /${link.id}</div>
                            <div class="link-url" id="display-url-${link.id}">${link.url}</div>
                        </div>
                        <div class="link-meta">
                            <span class="success-badge"><i class="fa-solid fa-circle-check"></i> ${link.completedTasksCount || 0} مكتمل</span>
                            <span class="toggle-icon"><i class="fa-solid fa-chevron-down"></i></span>
                        </div>
                    </div>
                    <div class="link-details">
                        <div class="details-wrapper">
                            <div class="edit-box">
                                <h4><i class="fa-solid fa-pen-to-square"></i> خيارات إدارة الرابط الأصلي:</h4>
                                <div class="edit-input-group">
                                    <input type="text" id="${inputId}" class="edit-url-input" value="${link.url}" placeholder="أدخل الرابط الجديد هنا...">
                                    <div class="action-buttons">
                                        <button class="save-btn" onclick="updateLink('${link.id}', '${inputId}')">
                                            <i class="fa-solid fa-floppy-disk"></i> حفظ التعديل
                                        </button>
                                        <button class="delete-btn" onclick="deleteLink('${link.id}')">
                                            <i class="fa-solid fa-trash-can"></i> حذف الرابط
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(linkItem);
            });
        }

        window.onload = fetchAnalytics;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | الإحصائيات</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        h2 { color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #334155; }
        th { background-color: #1e1b4b; color: #38bdf8; }
        tr:hover { background-color: #2e3e56; }
        a { color: #38bdf8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge { background: #10b981; padding: 4px 8px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 إحصائيات الروابط النشطة</h2>
    <p>تابع أداء جميع روابطك وعدد النقرات التي حصدتها من مكان واحد.</p>

    <table>
        <thead>
            <tr>
                <th>تاريخ الإنشاء</th>
                <th>رابط المتابعين</th>
                <th>الرابط الأصلي</th>
                <th>النقرات (Clicks)</th>
            </tr>
        </thead>
        <tbody id="linksTableBody">
            <!-- تحميل البيانات تلقائياً -->
        </tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<!-- استدعاء ملف الإعدادات الموحد -->
<script src="/api/config.js"></script>

<script>
    const tableBody = document.getElementById('linksTableBody');

    // جلب الروابط وترتيبها من الأحدث للأقدم
    db.collection("links").orderBy("createdAt", "desc").get().then((querySnapshot) => {
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const shareLink = window.location.origin + "/" + data.linkId;

            const row = `
                <tr>
                    <td>${data.createdAt || 'غير محدد'}</td>
                    <td><a href="${shareLink}" target="_blank">${shareLink}</a></td>
                    <td><a href="${data.originalLink}" target="_blank">فتح الرابط الأصل</a></td>
                    <td><span class="badge">${data.clicks} نقرة</span></td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }).catch(err => {
        console.error("خطأ في جلب البيانات: ", err);
        tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ef4444;">تأكد من تفعيل الـ Index في Firestore أو مراجعة صلاحيات القراءة.</td></tr>`;
    });
</script>
</body>
</html>

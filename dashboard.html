<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والإحصائيات 📊</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* باليت ألوان الفخامة الفاتحة الناعمة */
            --bg-pure: #f8fafc;
            --card-glass: rgba(255, 255, 255, 0.75);
            --border-laser: rgba(226, 232, 240, 0.8);
            
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.15);
            --neon-violet: #8b5cf6;
            --neon-violet-glow: rgba(139, 92, 246, 0.15);
            --neon-cyan: #06b6d4;
            --neon-cyan-glow: rgba(6, 182, 212, 0.15);
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.12);

            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --transition-cyber: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-fluid: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        /* سكرول بار ناعم متناسق مع التصميم الفاتح */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-pure);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-violet), var(--neon-cyan));
            border-radius: 10px;
        }

        body {
            background-color: var(--bg-pure);
            color: var(--text-main);
            padding: 60px 24px;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* تموجات ضوئية باستيل هادئة ومتحركة ببطء في الخلفية */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            filter: blur(150px);
            opacity: 0.4;
            animation: pulseGlow 12s infinite alternate;
        }
        body::before {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(139, 92, 246, 0.2));
            top: -10%;
            right: 10%;
        }
        body::after {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(16, 185, 129, 0.15));
            bottom: -10%;
            left: 5%;
            animation-delay: 6s;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.35; }
            100% { transform: scale(1.2) translate(40px, 40px); opacity: 0.5; }
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* هيدر تفاعلي راقي جداً */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            border-bottom: 1px dashed rgba(15, 23, 42, 0.08);
            padding-bottom: 30px;
        }

        header h1 {
            font-size: 30px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--text-main), var(--neon-violet), var(--neon-cyan));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 6s linear infinite;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        header h1 i {
            -webkit-background-clip: initial;
            -webkit-text-fill-color: initial;
            color: #ffffff;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-violet));
            padding: 14px;
            border-radius: 16px;
            font-size: 22px;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            animation: floatIcon 4s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(3deg); }
        }

        /* أدوات تصفية وبحث بحواف زجاجية متميزة */
        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper i {
            position: absolute;
            right: 18px;
            color: var(--neon-violet);
            pointer-events: none;
        }

        select, input {
            padding: 14px 22px;
            border: 1px solid var(--border-laser);
            border-radius: 14px;
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            outline: none;
            transition: var(--transition-cyber);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.03);
        }

        input {
            padding-right: 48px;
            width: 260px;
        }

        input:focus {
            width: 320px;
            border-color: var(--neon-violet);
            box-shadow: 0 0 20px var(--neon-violet-glow), 0 4px 12px rgba(139, 92, 246, 0.1);
        }

        input:focus + i {
            transform: scale(1.1);
        }

        select {
            cursor: pointer;
            padding-left: 36px;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%238b5cf6' stroke-width='2.5'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: left 16px center;
            background-size: 14px;
        }

        select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan-glow);
        }

        /* كروت إحصائيات متوهجة بلطف (Pastel Cards) */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 45px;
        }

        .stat-card {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-laser);
            position: relative;
            overflow: hidden;
            transition: var(--transition-cyber);
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.04);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: rotate(45deg);
            transition: 0.8s;
            pointer-events: none;
        }

        .stat-card:hover::after {
            left: 120%;
            top: 120%;
        }

        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--neon-violet);
            box-shadow: 0 15px 30px var(--neon-violet-glow), 0 10px 20px rgba(15, 23, 42, 0.05);
        }

        .stat-card:nth-child(3):hover {
            border-color: var(--neon-green);
            box-shadow: 0 15px 30px var(--neon-green-glow), 0 10px 20px rgba(16, 185, 129, 0.05);
        }

        .stat-card h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card h3 i {
            font-size: 18px;
            color: var(--neon-violet);
        }

        .stat-card:nth-child(3) h3 i {
            color: var(--neon-green);
        }

        .stat-card .value {
            font-size: 42px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        /* شبكة الكروت التفاعلية لقائمة الروابط */
        .links-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            transition: var(--transition-fluid);
        }

        .link-item {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--border-laser);
            overflow: hidden;
            transition: var(--transition-cyber);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.03);
        }

        .link-item:hover {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.08), 0 8px 20px rgba(15, 23, 42, 0.04);
            transform: translateY(-6px);
        }

        /* تمدد رائع للكارت النشط داخل الشبكة */
        @media (min-width: 900px) {
            .link-item.open {
                grid-column: span 2;
                border-color: var(--neon-violet);
                box-shadow: 0 20px 40px var(--neon-violet-glow), 0 10px 25px rgba(15, 23, 42, 0.05);
            }
        }

        .link-header {
            padding: 26px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            cursor: pointer;
            user-select: none;
            transition: var(--transition-fluid);
        }

        .link-header:hover {
            background-color: rgba(15, 23, 42, 0.01);
        }

        .link-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .link-slug {
            font-size: 19px;
            font-weight: 800;
            color: var(--neon-violet);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition-cyber);
        }

        .link-item:hover .link-slug {
            transform: translateX(-4px);
            color: var(--neon-pink);
        }

        .link-url {
            font-size: 13.5px;
            color: var(--text-muted);
            word-break: break-all;
            font-weight: 500;
        }

        .link-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px dashed rgba(15, 23, 42, 0.08);
            padding-top: 16px;
            width: 100%;
        }

        /* شارات زجاجية غاية في الأناقة */
        .clicks-badge, .success-badge {
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(15, 23, 42, 0.03);
        }

        .clicks-badge {
            background: rgba(139, 92, 246, 0.06);
            color: var(--neon-violet);
        }

        .success-badge {
            background: rgba(16, 185, 129, 0.06);
            color: #059669;
        }

        .toggle-icon {
            font-size: 12px;
            color: var(--text-muted);
            transition: var(--transition-cyber);
            background: rgba(15, 23, 42, 0.03);
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(15, 23, 42, 0.03);
        }

        .link-item.open .toggle-icon {
            transform: rotate(180deg);
            color: #ffffff;
            background: var(--neon-violet);
            border-color: var(--neon-violet);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        /* تفاصيل الرابط المنحوتة بسلاسة */
        .link-details {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(15, 23, 42, 0.02);
            border-top: 1px solid var(--border-laser);
        }

        .link-item.open .link-details {
            grid-template-rows: 1fr;
        }

        .details-wrapper {
            overflow: hidden;
        }

        .details-content {
            padding: 26px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            animation: contentSlideIn 0.5s ease;
        }

        @keyframes contentSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* صناديق البيانات الداخلية */
        .analytics-box {
            background: #ffffff;
            border: 1px solid var(--border-laser);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.02);
        }

        .analytics-box h4 {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 18px;
            border-bottom: 1px dashed rgba(15, 23, 42, 0.08);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .analytics-box h4 i {
            color: var(--neon-violet);
        }

        .analytics-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 6px;
            font-size: 13.5px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.02);
            transition: var(--transition-fluid);
        }

        .analytics-row:hover {
            background-color: rgba(15, 23, 42, 0.02);
            padding-right: 12px;
            padding-left: 12px;
            border-radius: 8px;
        }

        .analytics-row:last-child {
            border-bottom: none;
        }

        .analytics-label {
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .flag-icon {
            width: 24px;
            height: 16px;
            object-fit: cover;
            border-radius: 3px;
            box-shadow: 0 1px 4px rgba(15, 23, 42, 0.1);
        }

        .device-icon {
            color: var(--text-muted);
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .analytics-value {
            font-weight: 700;
            color: var(--neon-violet);
            background: rgba(139, 92, 246, 0.06);
            border: 1px solid rgba(139, 92, 246, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11.5px;
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 30px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .no-data i {
            font-size: 26px;
            color: #cbd5e1;
        }

        /* استجابة التصميم التامة على الهواتف */
        @media (max-width: 768px) {
            body {
                padding: 40px 16px;
            }
            .links-list {
                grid-template-columns: 1fr;
            }
            .details-content {
                grid-template-columns: 1fr;
                padding: 16px;
                gap: 16px;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .controls {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }
            .search-wrapper, input, select {
                width: 100%;
            }
            input:focus {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1><i class="fa-solid fa-chart-line"></i> لوحة التحكم وتحليل الإحصائيات</h1>
            <div class="controls">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="بحث عن رابط..." oninput="renderDashboard()">
                </div>
                <select id="sortSelect" onchange="renderDashboard()">
                    <option value="clicks-desc">الأكثر دخولاً 🔥</option>
                    <option value="clicks-asc">الأقل دخولاً ❄️</option>
                    <option value="date-desc">الأحدث إنشاءً 🕒</option>
                </select>
            </div>
        </header>

        <!-- نظرة عامة سريعة -->
        <div class="stats-overview">
            <div class="stat-card">
                <h3><i class="fa-solid fa-link"></i> إجمالي الروابط المختصرة</h3>
                <div class="value" id="totalLinks">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fa-solid fa-arrow-pointer"></i> إجمالي الزيارات (كليكات)</h3>
                <div class="value" id="totalClicks">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fa-solid fa-square-check"></i> إجمالي المهام المكتملة</h3>
                <div class="value" id="totalCompleted" style="color: var(--neon-green)">0</div>
            </div>
        </div>

        <!-- قائمة الروابط على شكل كروت شبكية متداخلة فاتحة -->
        <div class="links-list" id="linksList">
            <!-- سيتم توليد الروابط هنا عبر الـ JavaScript -->
        </div>
    </div>

    <script>
        let mockData = []; 

        async function fetchAnalytics() {
            try {
                const response = await fetch('/api/analytics'); 
                const data = await response.json();
                if(data.success) {
                    mockData = data.links; 
                    renderDashboard();     
                }
            } catch (err) {
                console.error("فشل جلب الإحصائيات الحقيقية:", err);
            }
        }

        function calculateOverview(links) {
            document.getElementById('totalLinks').innerText = links.length;
            const totalClicks = links.reduce((sum, link) => sum + (link.clicks || 0), 0);
            const totalCompleted = links.reduce((sum, link) => sum + (link.completedTasksCount || 0), 0);
            document.getElementById('totalClicks').innerText = totalClicks;
            document.getElementById('totalCompleted').innerText = totalCompleted;
        }

        function toggleLinkDetails(element) {
            const item = element.parentElement;
            item.classList.toggle('open');
        }

        function processAnalytics(summaryArray) {
            let countries = {};
            let devices = {};

            if (!summaryArray || summaryArray.length === 0) {
                return { countries: {}, devices: {} };
            }

            summaryArray.forEach(item => {
                if (item.country) {
                    countries[item.country] = (countries[item.country] || 0) + 1;
                }
                if (item.device) {
                    devices[item.device] = (devices[item.device] || 0) + 1;
                }
            });

            return { countries, devices };
        }

        getDeviceIcon = (device) => {
            const dev = device.toLowerCase();
            if (dev.includes('mobile')) return '<i class="fa-solid fa-mobile-button device-icon"></i>';
            if (dev.includes('tablet')) return '<i class="fa-solid fa-tablet-screen-button device-icon"></i>';
            return '<i class="fa-solid fa-desktop device-icon"></i>';
        }

        function renderDashboard() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const sortMethod = document.getElementById('sortSelect').value;
            const container = document.getElementById('linksList');
            
            container.innerHTML = "";

            let filteredLinks = mockData.filter(link => {
                return (link.id && link.id.toLowerCase().includes(searchInput)) || 
                       (link.url && link.url.toLowerCase().includes(searchInput));
            });

            if (sortMethod === 'clicks-desc') {
                filteredLinks.sort((a, b) => (b.clicks || 0) - (a.clicks || 0));
            } else if (sortMethod === 'clicks-asc') {
                filteredLinks.sort((a, b) => (a.clicks || 0) - (b.clicks || 0));
            } else if (sortMethod === 'date-desc') {
                filteredLinks.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }

            calculateOverview(filteredLinks);

            if (filteredLinks.length === 0) {
                container.innerHTML = '<div class="no-data"><i class="fa-regular fa-folder-open"></i> لم يتم العثور على أي روابط مطابقة للبحث.</div>';
                return;
            }

            filteredLinks.forEach(link => {
                const { countries, devices } = processAnalytics(link.analyticsSummary);

                let countryRows = Object.keys(countries).length > 0 ? 
                    Object.entries(countries).map(([code, count]) => {
                        const cleanCode = code.trim().toLowerCase();
                        const isUnknown = cleanCode === 'unknown';
                        const flagImg = isUnknown 
                            ? '<i class="fa-solid fa-earth-americas" style="font-size: 18px; color: var(--text-muted)"></i>'
                            : `<img src="https://flagcdn.com/w40/${cleanCode}.png" class="flag-icon" alt="${code}">`;

                        return `
                            <div class="analytics-row">
                                <span class="analytics-label">
                                    ${flagImg}
                                    ${code}
                                </span>
                                <span class="analytics-value">${count} زيارة</span>
                            </div>
                        `;
                    }).join('') : '<div class="no-data"><i class="fa-solid fa-triangle-exclamation"></i> لا توجد بيانات متاحة للدول بعد.</div>';

                let deviceRows = Object.keys(devices).length > 0 ? 
                    Object.entries(devices).map(([name, count]) => `
                        <div class="analytics-row">
                            <span class="analytics-label">
                                ${getDeviceIcon(name)}
                                ${name}
                            </span>
                            <span class="analytics-value">${count} زيارة</span>
                        </div>
                    `).join('') : '<div class="no-data"><i class="fa-solid fa-triangle-exclamation"></i> لا توجد بيانات متاحة للمنصات بعد.</div>';

                const linkItem = document.createElement('div');
                linkItem.className = 'link-item';
                linkItem.innerHTML = `
                    <div class="link-header" onclick="toggleLinkDetails(this)">
                        <div class="link-info">
                            <div class="link-slug"><i class="fa-solid fa-link" style="font-size: 14px;"></i> /${link.id}</div>
                            <div class="link-url">${link.url}</div>
                        </div>
                        <div class="link-meta">
                            <span class="clicks-badge"><i class="fa-regular fa-chart-bar"></i> ${link.clicks || 0} زيارة</span>
                            <span class="success-badge"><i class="fa-solid fa-circle-check"></i> ${link.completedTasksCount || 0} مكتمل</span>
                            <span class="toggle-icon"><i class="fa-solid fa-chevron-down"></i></span>
                        </div>
                    </div>
                    <div class="link-details">
                        <div class="details-wrapper">
                            <div class="details-content">
                                <div class="analytics-box">
                                    <h4><i class="fa-solid fa-globe"></i> توزيع الدول (أعلى الدول دخولا)</h4>
                                    ${countryRows}
                                </div>
                                <div class="analytics-box">
                                    <h4><i class="fa-solid fa-mobile-screen"></i> توزيع المنصات والأجهزة</h4>
                                    ${deviceRows}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(linkItem);
            });
        }

        window.onload = fetchAnalytics;
    </script>
</body>
</html>

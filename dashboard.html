<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والإحصائيات 📊</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* باليت ألوان داكنة فاخرة مع نيون */
            --bg-dark: #090d16;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-hover-bg: rgba(30, 41, 59, 0.85);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --cyan: #06b6d4;
            --cyan-glow: rgba(6, 182, 212, 0.3);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(99, 102, 241, 0.4);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 50px 24px;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* توهج كوني متحرك في الخلفية للفخامة البصرية */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
            z-index: -1;
            animation: backgroundFloat 20s ease-in-out infinite alternate;
        }

        @keyframes backgroundFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(2%, 2%) scale(1.05); }
        }

        .dashboard-container {
            max-width: 1140px;
            margin: 0 auto;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* الهيدر الأنيق */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header h1 i {
            background: linear-gradient(135deg, var(--primary), var(--cyan));
            -webkit-background-clip: initial;
            -webkit-text-fill-color: initial;
            color: #ffffff;
            padding: 14px;
            border-radius: 18px;
            font-size: 22px;
            box-shadow: 0 8px 25px var(--primary-glow);
            animation: pulseIcon 3s infinite alternate;
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); box-shadow: 0 8px 20px var(--primary-glow); }
            100% { transform: scale(1.05); box-shadow: 0 8px 30px rgba(6, 182, 212, 0.5); }
        }

        /* حقول الإدخال الفخمة */
        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-wrapper i {
            position: absolute;
            right: 18px;
            color: var(--text-muted);
            font-size: 15px;
            transition: var(--transition-smooth);
        }

        select, input {
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            outline: none;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        input {
            padding-right: 48px;
            width: 280px;
        }

        input:focus {
            width: 320px; /* يتسع بنعومة عند البحث */
            border-color: var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow);
        }

        input:focus + i {
            color: var(--cyan);
            transform: scale(1.1);
        }

        select {
            cursor: pointer;
            padding-left: 36px;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: left 16px center;
            background-size: 14px;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* كروت الإحصائيات (تأثير ثلاثي الأبعاد مضيء) */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 45px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--cyan));
        }

        .stat-card:nth-child(3)::before {
            background: linear-gradient(90deg, var(--success), #34d399);
        }

        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--border-hover);
            box-shadow: 0 15px 30px var(--primary-glow);
            background: var(--card-hover-bg);
        }

        .stat-card:nth-child(3):hover {
            box-shadow: 0 15px 30px var(--success-glow);
            border-color: var(--success);
        }

        .stat-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-card h3 i {
            font-size: 18px;
            color: var(--cyan);
        }

        .stat-card:nth-child(3) h3 i {
            color: var(--success);
        }

        .stat-card .value {
            font-size: 40px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* قائمة الروابط الفاخرة */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .link-item {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: var(--transition-smooth);
        }

        .link-item:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3), 0 0 15px rgba(99, 102, 241, 0.1);
        }

        .link-header {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: var(--transition-smooth);
        }

        .link-header:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .link-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .link-slug {
            font-size: 19px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
            transition: var(--transition-smooth);
        }

        .link-item:hover .link-slug {
            color: #818cf8;
            transform: translateX(-4px);
        }

        .link-url {
            font-size: 14px;
            color: var(--text-muted);
            word-break: break-all;
            max-width: 80%;
            font-weight: 500;
        }

        .link-meta {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        /* شارات مضيئة كالمستقبل (Neon Badges) */
        .clicks-badge, .success-badge {
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .clicks-badge {
            background: rgba(99, 102, 241, 0.12);
            color: #a5b4fc;
            border-color: rgba(99, 102, 241, 0.25);
        }

        .success-badge {
            background: rgba(16, 185, 129, 0.12);
            color: #a7f3d0;
            border-color: rgba(16, 185, 129, 0.25);
        }

        .toggle-icon {
            font-size: 14px;
            color: var(--text-muted);
            transition: var(--transition-smooth);
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-item.open .toggle-icon {
            transform: rotate(180deg);
            color: #ffffff;
            background: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* فتح انسيابي فائق السلاسة بتأثير شبكي (Grid Trick) */
        .link-details {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(0, 0, 0, 0.15);
            border-top: 1px solid var(--border-color);
        }

        .link-item.open .link-details {
            grid-template-rows: 1fr;
        }

        .details-wrapper {
            overflow: hidden;
        }

        .details-content {
            padding: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            animation: contentSlideIn 0.5s ease;
        }

        @keyframes contentSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* صناديق التحليلات */
        .analytics-box {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 26px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .analytics-box h4 {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .analytics-box h4 i {
            color: var(--cyan);
        }

        .analytics-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 10px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            transition: var(--transition-smooth);
        }

        .analytics-row:hover {
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding-right: 16px;
            padding-left: 16px;
        }

        .analytics-row:last-child {
            border-bottom: none;
        }

        .analytics-label {
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .flag-icon {
            width: 26px;
            height: 18px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .device-icon {
            color: var(--text-muted);
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .analytics-value {
            font-weight: 700;
            color: var(--cyan);
            background: rgba(6, 182, 212, 0.12);
            border: 1px solid rgba(6, 182, 212, 0.2);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 12.5px;
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.1);
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .no-data i {
            font-size: 32px;
            color: #334155;
        }

        /* تحسينات الشاشات الصغيرة (الجوال) */
        @media (max-width: 768px) {
            body {
                padding: 30px 16px;
            }
            .details-content {
                grid-template-columns: 1fr;
                padding: 24px;
                gap: 24px;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 24px;
            }
            .controls {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }
            .search-wrapper, input, select {
                width: 100%;
            }
            input:focus {
                width: 100%;
            }
            .link-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
                padding: 24px;
            }
            .link-meta {
                width: 100%;
                justify-content: space-between;
            }
            .link-url {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1><i class="fa-solid fa-chart-line"></i> لوحة التحكم وتحليل الإحصائيات</h1>
            <div class="controls">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="بحث عن رابط..." oninput="renderDashboard()">
                </div>
                <select id="sortSelect" onchange="renderDashboard()">
                    <option value="clicks-desc">الأكثر دخولاً 🔥</option>
                    <option value="clicks-asc">الأقل دخولاً ❄️</option>
                    <option value="date-desc">الأحدث إنشاءً 🕒</option>
                </select>
            </div>
        </header>

        <!-- نظرة عامة سريعة -->
        <div class="stats-overview">
            <div class="stat-card">
                <h3><i class="fa-solid fa-link"></i> إجمالي الروابط المختصرة</h3>
                <div class="value" id="totalLinks">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fa-solid fa-arrow-pointer"></i> إجمالي الزيارات (كليكات)</h3>
                <div class="value" id="totalClicks">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fa-solid fa-square-check"></i> إجمالي المهام المكتملة</h3>
                <div class="value" id="totalCompleted" style="color: var(--success)">0</div>
            </div>
        </div>

        <!-- قائمة الروابط -->
        <div class="links-list" id="linksList">
            <!-- سيتم توليد الروابط هنا عبر الـ JavaScript -->
        </div>
    </div>

    <script>
        let mockData = []; 

        async function fetchAnalytics() {
            try {
                const response = await fetch('/api/analytics'); 
                const data = await response.json();
                if(data.success) {
                    mockData = data.links; 
                    renderDashboard();     
                }
            } catch (err) {
                console.error("فشل جلب الإحصائيات الحقيقية:", err);
            }
        }

        function calculateOverview(links) {
            document.getElementById('totalLinks').innerText = links.length;
            const totalClicks = links.reduce((sum, link) => sum + (link.clicks || 0), 0);
            const totalCompleted = links.reduce((sum, link) => sum + (link.completedTasksCount || 0), 0);
            document.getElementById('totalClicks').innerText = totalClicks;
            document.getElementById('totalCompleted').innerText = totalCompleted;
        }

        function toggleLinkDetails(element) {
            const item = element.parentElement;
            item.classList.toggle('open');
        }

        function processAnalytics(summaryArray) {
            let countries = {};
            let devices = {};

            if (!summaryArray || summaryArray.length === 0) {
                return { countries: {}, devices: {} };
            }

            summaryArray.forEach(item => {
                if (item.country) {
                    countries[item.country] = (countries[item.country] || 0) + 1;
                }
                if (item.device) {
                    devices[item.device] = (devices[item.device] || 0) + 1;
                }
            });

            return { countries, devices };
        }

        getDeviceIcon = (device) => {
            const dev = device.toLowerCase();
            if (dev.includes('mobile')) return '<i class="fa-solid fa-mobile-button device-icon"></i>';
            if (dev.includes('tablet')) return '<i class="fa-solid fa-tablet-screen-button device-icon"></i>';
            return '<i class="fa-solid fa-desktop device-icon"></i>';
        }

        function renderDashboard() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const sortMethod = document.getElementById('sortSelect').value;
            const container = document.getElementById('linksList');
            
            container.innerHTML = "";

            let filteredLinks = mockData.filter(link => {
                return (link.id && link.id.toLowerCase().includes(searchInput)) || 
                       (link.url && link.url.toLowerCase().includes(searchInput));
            });

            if (sortMethod === 'clicks-desc') {
                filteredLinks.sort((a, b) => (b.clicks || 0) - (a.clicks || 0));
            } else if (sortMethod === 'clicks-asc') {
                filteredLinks.sort((a, b) => (a.clicks || 0) - (b.clicks || 0));
            } else if (sortMethod === 'date-desc') {
                filteredLinks.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }

            calculateOverview(filteredLinks);

            if (filteredLinks.length === 0) {
                container.innerHTML = '<div class="no-data"><i class="fa-regular fa-folder-open"></i> لم يتم العثور على أي روابط مطابقة للبحث.</div>';
                return;
            }

            filteredLinks.forEach(link => {
                const { countries, devices } = processAnalytics(link.analyticsSummary);

                let countryRows = Object.keys(countries).length > 0 ? 
                    Object.entries(countries).map(([code, count]) => {
                        const cleanCode = code.trim().toLowerCase();
                        const isUnknown = cleanCode === 'unknown';
                        const flagImg = isUnknown 
                            ? '<i class="fa-solid fa-earth-americas" style="font-size: 18px; color: var(--text-muted)"></i>'
                            : `<img src="https://flagcdn.com/w40/${cleanCode}.png" class="flag-icon" alt="${code}">`;

                        return `
                            <div class="analytics-row">
                                <span class="analytics-label">
                                    ${flagImg}
                                    ${code}
                                </span>
                                <span class="analytics-value">${count} زيارة</span>
                            </div>
                        `;
                    }).join('') : '<div class="no-data"><i class="fa-solid fa-triangle-exclamation"></i> لا توجد بيانات متاحة للدول بعد.</div>';

                let deviceRows = Object.keys(devices).length > 0 ? 
                    Object.entries(devices).map(([name, count]) => `
                        <div class="analytics-row">
                            <span class="analytics-label">
                                ${getDeviceIcon(name)}
                                ${name}
                            </span>
                            <span class="analytics-value">${count} زيارة</span>
                        </div>
                    `).join('') : '<div class="no-data"><i class="fa-solid fa-triangle-exclamation"></i> لا توجد بيانات متاحة للمنصات بعد.</div>';

                const linkItem = document.createElement('div');
                linkItem.className = 'link-item';
                linkItem.innerHTML = `
                    <div class="link-header" onclick="toggleLinkDetails(this)">
                        <div class="link-info">
                            <div class="link-slug"><i class="fa-solid fa-link" style="font-size: 14px;"></i> /${link.id}</div>
                            <div class="link-url">${link.url}</div>
                        </div>
                        <div class="link-meta">
                            <span class="clicks-badge"><i class="fa-regular fa-chart-bar"></i> ${link.clicks || 0} زيارة</span>
                            <span class="success-badge"><i class="fa-solid fa-circle-check"></i> ${link.completedTasksCount || 0} مكتمل</span>
                            <span class="toggle-icon"><i class="fa-solid fa-chevron-down"></i></span>
                        </div>
                    </div>
                    <div class="link-details">
                        <div class="details-wrapper">
                            <div class="details-content">
                                <div class="analytics-box">
                                    <h4><i class="fa-solid fa-globe"></i> توزيع الدول (أعلى الدول دخولا)</h4>
                                    ${countryRows}
                                </div>
                                <div class="analytics-box">
                                    <h4><i class="fa-solid fa-mobile-screen"></i> توزيع المنصات والأجهزة</h4>
                                    ${deviceRows}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(linkItem);
            });
        }

        window.onload = fetchAnalytics;
    </script>
</body>
</html>

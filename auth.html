<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: #0c0d10; 
            background-image: 
                radial-gradient(at 10% 10%, rgba(255, 215, 0, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(255, 215, 0, 0.05) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
        }

        .auth-container {
            width: 420px;
            max-width: 100%;
            padding: 40px 35px;
            border-radius: 28px;
            background: rgba(20, 21, 25, 0.6);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-container img {
            max-width: 140px;
            height: auto;
        }

        h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            right: 18px;
            color: #ffd700;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 15px 48px 15px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            outline: none;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ffd700 0%, #b89b00 100%);
            color: #000;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 800;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.25);
            background: linear-gradient(135deg, #ffea00 0%, #c9a900 100%);
        }

        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .toggle-text {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #a0a0a0;
            font-weight: 600;
        }

        .toggle-text span {
            color: #ffd700;
            cursor: pointer;
            text-decoration: underline;
        }

        .message-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            display: none;
        }

        .msg-error {
            background: rgba(255, 80, 80, 0.1);
            color: #ff8080;
            border: 1px solid rgba(255, 80, 80, 0.3);
        }

        .msg-warning {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .msg-success {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        #global-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0c0d10;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffd700;
            font-size: 24px;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div id="global-loader">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <h3 style="font-size: 16px;">جاري التحقق من حالة الدخول...</h3>
    </div>

    <div class="auth-container">
        <div class="logo-container">
            <img src="logo.png" alt="شعار الموقع">
        </div>

        <h2 id="form-title">تسجيل الدخول</h2>

        <form id="auth-form">
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required minlength="6">
                <i class="fa-solid fa-lock"></i>
            </div>

            <button type="submit" id="submit-btn">
                <i class="fa-solid fa-right-to-bracket"></i> <span>دخول</span>
            </button>
        </form>

        <div id="message-box" class="message-box"></div>

        <div class="toggle-text">
            <span id="toggle-hint">ليس لديك حساب؟</span> 
            <span id="toggle-btn" onclick="toggleAuthMode()">إنشاء حساب جديد</span>
        </div>
    </div>

    <!-- استدعاء الدوال من Modular SDK و إعدادات فايربيس الخاصة بك -->
    <script type="module">
        import { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // استدعاء auth و db من ملفك الخارجي
        import { auth, db } from "./api/firebase.js";

        // متغيرات الواجهة
        let isLoginMode = true;
        const formTitle = document.getElementById('form-title');
        const submitBtnText = document.querySelector('#submit-btn span');
        const submitBtnIcon = document.querySelector('#submit-btn i');
        const toggleHint = document.getElementById('toggle-hint');
        const toggleBtn = document.getElementById('toggle-btn');
        const authForm = document.getElementById('auth-form');
        const messageBox = document.getElementById('message-box');
        const submitBtn = document.getElementById('submit-btn');
        const globalLoader = document.getElementById('global-loader');

        // دالة التبديل
        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            messageBox.style.display = 'none';
            if (isLoginMode) {
                formTitle.innerText = "تسجيل الدخول";
                submitBtnText.innerText = "دخول";
                submitBtnIcon.className = "fa-solid fa-right-to-bracket";
                toggleHint.innerText = "ليس لديك حساب؟";
                toggleBtn.innerText = "إنشاء حساب جديد";
            } else {
                formTitle.innerText = "إنشاء حساب جديد";
                submitBtnText.innerText = "إنشاء حساب";
                submitBtnIcon.className = "fa-solid fa-user-plus";
                toggleHint.innerText = "لديك حساب بالفعل؟";
                toggleBtn.innerText = "تسجيل الدخول";
            }
        };

        // دالة عرض الرسائل
        function showMessage(msg, type) {
            messageBox.style.display = 'block';
            messageBox.className = `message-box msg-${type}`;
            messageBox.innerHTML = msg;
        }

        // 1. التحقق التلقائي
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const status = docSnap.data().status;
                        if (status === 'approved') {
                            window.location.href = 'dashboard.html';
                            return; 
                        } else if (status === 'rejected') {
                            showMessage("تم رفض حسابك من قبل الإدارة.", "error");
                            await signOut(auth);
                        } else {
                            showMessage("حسابك قيد المراجعة. الرجاء انتظار الموافقة.", "warning");
                            await signOut(auth);
                        }
                    }
                } catch (error) {
                    console.error("خطأ في جلب البيانات:", error);
                }
            }
            globalLoader.style.display = 'none';
        });

        // 2. معالجة إرسال الفورم
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtnText.innerText = "جاري التحميل...";
            messageBox.style.display = 'none';

            try {
                if (isLoginMode) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        const status = docSnap.data().status;
                        
                        if (status === 'approved') {
                            showMessage("تم تسجيل الدخول بنجاح! جاري التوجيه...", "success");
                            window.location.href = 'dashboard.html';
                        } else if (status === 'rejected') {
                            showMessage("<i class='fa-solid fa-circle-xmark'></i> تم رفض هذا الحساب من الإدارة.", "error");
                            await signOut(auth);
                        } else {
                            showMessage("<i class='fa-solid fa-clock-rotate-left'></i> حسابك قيد المراجعة، الرجاء الانتظار.", "warning");
                            await signOut(auth);
                        }
                    } else {
                        showMessage("بيانات المستخدم غير موجودة في قاعدة البيانات.", "error");
                        await signOut(auth);
                    }

                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    await setDoc(doc(db, "users", user.uid), {
                        email: email,
                        status: 'pending',
                        createdAt: new Date().toISOString()
                    });

                    showMessage("<i class='fa-solid fa-circle-check'></i> تم إنشاء الحساب بنجاح! الرجاء انتظار موافقة الإدارة.", "success");
                    await signOut(auth);
                    
                    setTimeout(() => {
                        window.toggleAuthMode();
                        document.getElementById('password').value = '';
                    }, 3000);
                }
            } catch (error) {
                let errorMsg = "حدث خطأ غير متوقع.";
                if(error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') errorMsg = "البريد الإلكتروني أو كلمة المرور غير صحيحة.";
                if(error.code === 'auth/email-already-in-use') errorMsg = "البريد الإلكتروني مستخدم بالفعل.";
                if(error.code === 'auth/weak-password') errorMsg = "كلمة المرور ضعيفة جداً.";
                
                showMessage(errorMsg, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtnText.innerText = isLoginMode ? "دخول" : "إنشاء حساب";
            }
        });
    </script>
</body>
                                                                         </html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع تحت التطوير</title>
    
    <!-- السكريبت الإعلاني الخاص بك -->
    <script data-cfasync="false" src="//dcbbwymp1bhlf.cloudfront.net/?wbbcd=1444225"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1e1b4b, #090514);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* خلفية جمالية متحركة خفيفة */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #4f46e5;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            top: 10%;
            left: 15%;
            animation: float 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: #06b6d4;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            bottom: 10%;
            right: 15%;
            animation: float 12s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-30px) translateX(20px); }
        }

        .container {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            padding: 50px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #38bdf8;
            font-weight: 800;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* زر التواصل مع المطور عبر واتساب */
        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: #ffffff;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
        }

        .btn-whatsapp:hover {
            background-color: #20ba5a;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(37, 211, 102, 0.5);
        }

        .btn-whatsapp svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-left: 10px;
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- أيقونة تعبيرية تدل على العمل والتطوير -->
        <div class="icon">🛠️</div>
        
        <h1>الموقع تحت التطوير</h1>
        <p>نعمل حالياً على بناء وتطوير تجربة فريدة ومميزة لك. سنكون جاهزين للإطلاق قريباً جداً، انتظرونا!</p>
        
        <!-- زر التواصل مع الواتساب -->
        <a href="https://wa.me/201099433038?text=مرحباً،%20أود%20التواصل%20مع%20مطور%20الموقع" target="_blank" class="btn-whatsapp">
            <!-- أيقونة واتساب SVG -->
            <svg viewBox="0 0 24 24">

            تواصل مع المطور

        <div class="footer">
            جميع الحقوق محفوظة © 2026
        </div>
    </div>

</body>
</html>
